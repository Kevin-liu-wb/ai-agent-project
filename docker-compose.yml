networks:
  ai-agent-network:
  ai-agent-shared:
    external: true
volumes:
  ai-agent-data-vllm:
  ai-agent-data-dev:
  ai-agent-data-openwebui:
  ai-agent-data-redis:
  ai-agent-data-postgres:
  ai-agent-data-dify:
  ai-agent-data-dify-uploads:
services:
  # --------------------------
  # PostgreSQL（带pgvector，基础+向量存储）
  # --------------------------
  postgres:
    image: ankane/pgvector:latest
    container_name: ai-agent-postgres
    restart: always
    ports:
      - "8004:5432"
    networks:
      - ai-agent-network
    volumes:
      - ai-agent-data-postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=aiagent
      - POSTGRES_PASSWORD=aiagent123
      - POSTGRES_DB=aiagentdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiagent -d aiagentdb"]
      interval: 5s
      timeout: 5s
      retries: 5
  # --------------------------
  # Redis缓存（vLLM/开发环境共用）
  # --------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-agent-redis
    restart: always
    ports:
      - "8002:6379"
    networks:
      - ai-agent-network
    volumes:
      - ai-agent-data-redis:/data
    command: redis-server --save 60 1 --loglevel warning
  # --------------------------
  # 可视化界面 Open WebUI（无需登录、国内可拉）
  # --------------------------
  # open-web-ui:
  #   image: ghcr.io/open-webui/open-webui:main
  #   container_name: ai-agent-open-webui
  #   restart: always
  #   ports:
  #     - "8001:8080"
  #   networks:
  #     - ai-agent-network
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   volumes:
  #     - ai-agent-data-openwebui:/app/backend/data
  #   environment:
  #     - OLLAMA_BASE_URL=http://host.docker.internal:11434
  #     - OPENAI_API_BASE_URL=http://host.docker.internal:11434/v1
  #     - OPENAI_API_KEY=sk-123456  # 随便填，Ollama不需要真实密钥
  #     - ENABLE_OLLAMA_API=true  # 启用Ollama原生API
  # --------------------------
  # Dify（LangChain可视化开发平台）
  # --------------------------
  # 1. Dify 后端 API
  dify-api:
    image: langgenius/dify-api:0.15.8
    container_name: ai-agent-dify-api
    restart: always
    ports:
      - "5001:5001" 
    networks:
      - ai-agent-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ai-agent-data-dify:/app/api/data
      - ai-agent-data-dify-uploads:/app/api/storage
    environment:
      - MODE=production
      - LOG_LEVEL=INFO
      - OPENDAL_SCHEME=fs
      - OPENDAL_FS_ROOT=/app/api/storage
      - VECTOR_STORE_TYPE=pgvector
      # - VECTOR_STORE_PGVECTOR_DIM=1536
      # 数据库
      - DB_TYPE=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=aiagent
      - DB_PASSWORD=aiagent123
      - DB_DATABASE=aiagentdb
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # Key
      - SECRET_KEY=your-super-secret-dev-key-1234567890
      - SESSION_SECRET_KEY=your-super-secret-dev-key-1234567890
      # 🌐 核心：CORS 完全放开（开发环境专用）
      - CORS_ALLOWED_ORIGINS=*
      - CORS_ALLOW_CREDENTIALS=true
      - CORS_ALLOWED_METHODS=*
      - CORS_ALLOWED_HEADERS=*
      # 🍪 核心：Cookie 配置（解决跨域存储问题）
      - COOKIE_DOMAIN=127.0.0.1
      - COOKIE_SECURE=false
      - COOKIE_SAME_SITE=Lax
      - AUTH_COOKIE_SECURE=false
      - AUTH_COOKIE_SAMESITE=Lax
      # - INIT_CHECK=true
      # - PLUGIN_DEFAULT_ENABLED=false
      # - PLUGIN_INSTALL_ENABLED=false
    # command: >
    #   /bin/sh -c "
    #   sleep 10 &&
    #   source .venv/bin/activate &&
    #   flask db upgrade &&
    #   flask init-data --yes &&  # 0.15.8 专用的初始化命令，生成默认配置
    #   exec gunicorn --preload --worker-class=gevent -t 3600 -w 4 -b 0.0.0.0:5001 app:app
    #   "
    command: >
      /bin/sh -c "
      sleep 10 &&
      flask db upgrade &&
      flask init-data --yes &&
      exec gunicorn --preload --worker-class=gevent -t 3600 -w 4 -b 0.0.0.0:5001 app:app
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  # 2. Dify 前端 Web
  dify-web:
    image: langgenius/dify-web:0.15.8
    container_name: ai-agent-dify-web
    restart: always
    ports:
      - "8003:3000"
    networks:
      - ai-agent-network
    environment:
      - NEXT_PUBLIC_API_URL=http://127.0.0.1:5001
      - NEXT_PUBLIC_CONSOLE_API_URL=http://127.0.0.1:5001/console/api
      - NEXT_PUBLIC_PUBLIC_API_URL=http://127.0.0.1:5001/v1

      - NEXT_PUBLIC_COOKIE_DOMAIN=127.0.0.1
      - NEXT_PUBLIC_AUTH_COOKIE_SECURE=false
      - NEXT_PUBLIC_AUTH_COOKIE_SAME_SITE=Lax

      - NEXT_PUBLIC_PLUGIN_MARKETPLACE_ENABLED=false
    depends_on:
      - dify-api
  # --------------------------
  # AI 开发容器（Python + LangChain）
  # --------------------------
  ai-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent-dev
    restart: always
    ports:
      - "8005:8000"
    volumes:
      - /Users/kevin/develop/ai-agent-project/ai-agent-data-dev:/app
      # - ai-agent-data-dev:/app
      # - ./models:/app/models
      # - ./requirements.txt:/app/requirements.txt
      # - ./.env:/app/.env
    working_dir: /app
    networks:
      - ai-agent-network
      - ai-agent-shared
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://aiagent:aiagent123@postgres:5432/aiagentdb
      # - HF_TOKEN=${HF_TOKEN}
      # - HF_ENDPOINT=${HF_ENDPOINT}
      - DIFY_API_KEY=${DIFY_API_KEY}
      - DIFY_API_BASE_URL=${DIFY_API_BASE_URL}
      - OLLAMA_API_URL=http://host.docker.internal:11434
    command: sleep infinity
    depends_on:
      - redis
      - postgres
      - dify-api
